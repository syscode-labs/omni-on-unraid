[tools]

[tasks."infra:init"]
description = "Initialize Terraform for Omni VM infrastructure"
run = "cd terraform/libvirt && terraform init"

[tasks."infra:plan"]
description = "Plan Omni VM infrastructure changes"
run = "cd terraform/libvirt && terraform plan"

[tasks."infra:apply"]
description = "Apply Omni VM infrastructure"
run = "cd terraform/libvirt && terraform apply"

[tasks."infra:destroy"]
description = "Destroy Omni VM infrastructure"
run = "cd terraform/libvirt && terraform destroy"

[tasks."omni:doctor"]
description = "Validate local prerequisites for Omni operations"
run = '''
set -euo pipefail
command -v docker >/dev/null
if ! docker compose version >/dev/null 2>&1; then
  echo "docker compose plugin is required" >&2
  exit 1
fi
if [ ! -f .env ]; then
  echo "Missing .env (copy templates/omni.env.example .env)" >&2
  exit 1
fi
echo "Prerequisites look good"
'''

[tasks."omni:render"]
description = "Render pinned Omni deployment assets"
run = "./scripts/render.sh"

[tasks."omni:up"]
description = "Start Omni stack"
run = "./scripts/up.sh"

[tasks."omni:down"]
description = "Stop Omni stack"
run = "./scripts/down.sh"

[tasks."omni:backup"]
description = "Backup Omni data"
run = "./scripts/backup.sh"

[tasks."omni:restore"]
description = "Restore Omni data from BACKUP"
run = '''
set -euo pipefail
if [ -z "${BACKUP:-}" ]; then
  echo "Set BACKUP=/path/to/backup.tar.gz" >&2
  exit 1
fi
./scripts/restore.sh "$BACKUP"
'''

[tasks."omni:deploy-remote"]
description = "Sync repo to Omni VM and apply Omni there"
run = "./scripts/deploy-remote.sh"

[tasks."stack:provision"]
description = "Provision VM infra then deploy Omni remotely"
depends = ["infra:apply", "omni:deploy-remote"]
