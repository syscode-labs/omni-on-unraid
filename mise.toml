[tools]

[tasks."infra:prepare-image"]
description = "Download/sync Ubuntu cloud image to libvirt host path"
run = "./scripts/prepare-base-image.sh"

[tasks."infra:check"]
description = "Validate required .env inputs for infra provisioning"
run = "./scripts/infra-check.sh"

[tasks."infra:init"]
description = "Initialize Terraform for Omni VM infrastructure"
run = "./scripts/run-terraform.sh init"

[tasks."infra:plan"]
description = "Plan Omni VM infrastructure changes"
depends = ["infra:check"]
run = "./scripts/run-terraform.sh plan"

[tasks."infra:apply"]
description = "Apply Omni VM infrastructure"
depends = ["infra:check"]
run = "./scripts/run-terraform.sh apply"

[tasks."infra:destroy"]
description = "Destroy Omni VM infrastructure"
run = "./scripts/run-terraform.sh destroy"

[tasks."omni:doctor"]
description = "Validate local prerequisites for Omni operations"
run = '''
set -euo pipefail
command -v docker >/dev/null
if ! docker compose version >/dev/null 2>&1; then
  echo "docker compose plugin is required" >&2
  exit 1
fi
if [ ! -f .env ]; then
  echo "Missing .env (copy templates/omni.env.example .env)" >&2
  exit 1
fi
echo "Prerequisites look good"
'''

[tasks."omni:render"]
description = "Render pinned Omni deployment assets"
run = "./scripts/render.sh"

[tasks."omni:up"]
description = "Start Omni stack"
run = "./scripts/up.sh"

[tasks."omni:down"]
description = "Stop Omni stack"
run = "./scripts/down.sh"

[tasks."omni:backup"]
description = "Backup Omni data"
run = "./scripts/backup.sh"

[tasks."omni:restore"]
description = "Restore Omni data from BACKUP"
run = '''
set -euo pipefail
if [ -z "${BACKUP:-}" ]; then
  echo "Set BACKUP=/path/to/backup.tar.gz" >&2
  exit 1
fi
./scripts/restore.sh "$BACKUP"
'''

[tasks."omni:deploy-remote"]
description = "Sync repo to Omni VM and apply Omni there"
run = "./scripts/deploy-remote.sh"

[tasks."stack:provision"]
description = "Provision VM infra then deploy Omni remotely"
depends = ["infra:prepare-image", "infra:apply", "omni:deploy-remote"]

[tasks."ctr:shell"]
description = "Open interactive shell in ops container"
run = "./scripts/in-container.sh"

[tasks."ctr:infra:prepare-image"]
description = "Containerized infra:prepare-image"
run = "./scripts/in-container.sh infra:prepare-image"

[tasks."ctr:infra:check"]
description = "Containerized infra:check"
run = "./scripts/in-container.sh infra:check"

[tasks."ctr:infra:init"]
description = "Containerized infra:init"
run = "./scripts/in-container.sh infra:init"

[tasks."ctr:infra:plan"]
description = "Containerized infra:plan"
run = "./scripts/in-container.sh infra:plan"

[tasks."ctr:infra:apply"]
description = "Containerized infra:apply"
run = "./scripts/in-container.sh infra:apply"

[tasks."ctr:infra:destroy"]
description = "Containerized infra:destroy"
run = "./scripts/in-container.sh infra:destroy"

[tasks."ctr:omni:deploy-remote"]
description = "Containerized omni:deploy-remote"
run = "./scripts/in-container.sh omni:deploy-remote"

[tasks."ctr:stack:provision"]
description = "Containerized stack provision (image -> apply -> deploy)"
depends = ["ctr:infra:prepare-image", "ctr:infra:apply", "ctr:omni:deploy-remote"]

