name: apply

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          UNRAID_HOST: ${{ secrets.UNRAID_HOST }}
          UNRAID_USER: ${{ secrets.UNRAID_USER }}
          UNRAID_SSH_PRIVATE_KEY: ${{ secrets.UNRAID_SSH_PRIVATE_KEY }}
          UNRAID_TARGET_DIR: ${{ secrets.UNRAID_TARGET_DIR }}
        run: |
          for key in UNRAID_HOST UNRAID_USER UNRAID_SSH_PRIVATE_KEY UNRAID_TARGET_DIR; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UNRAID_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.UNRAID_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repository to Unraid
        run: |
          rsync -az --delete ./ "${{ secrets.UNRAID_USER }}@${{ secrets.UNRAID_HOST }}:${{ secrets.UNRAID_TARGET_DIR }}/"

      - name: Render and apply Omni on Unraid
        run: |
          ssh "${{ secrets.UNRAID_USER }}@${{ secrets.UNRAID_HOST }}" \
            "cd '${{ secrets.UNRAID_TARGET_DIR }}' && ./scripts/render.sh && ./scripts/up.sh"
