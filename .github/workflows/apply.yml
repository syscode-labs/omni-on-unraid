name: apply

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UNRAID_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.UNRAID_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repository to Unraid
        run: |
          rsync -az --delete ./ "${{ secrets.UNRAID_USER }}@${{ secrets.UNRAID_HOST }}:${{ secrets.UNRAID_TARGET_DIR }}/"

      - name: Render and apply Omni on Unraid
        run: |
          ssh "${{ secrets.UNRAID_USER }}@${{ secrets.UNRAID_HOST }}" \
            "cd '${{ secrets.UNRAID_TARGET_DIR }}' && ./scripts/render.sh && ./scripts/up.sh"
